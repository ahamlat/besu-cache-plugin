<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Besu SLOAD Cache Analysis</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3;
          --muted: #8b949e; --accent: #58a6ff; --cold: #f85149; --warm: #3fb950;
          --hit: #3fb950; --miss: #f85149; --mem: #d29922; --nf: #f0883e; --acc: #8b949e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 1.4em; margin-bottom: 16px; color: var(--accent); }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .controls input, .controls select, .controls button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  .controls button { cursor: pointer; background: var(--accent); color: #000; font-weight: 600; border: none; }
  .controls button:hover { opacity: 0.9; }
  .controls button.toggle-on { background: var(--warm); }
  .summary { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
               padding: 10px 16px; min-width: 120px; }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface);
          border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 12px; }
  th { background: #1c2128; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }
  tr:hover td { background: rgba(88,166,255,0.05); }
  .addr { font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 11px; }
  .name { color: var(--accent); font-weight: 500; }
  .pct-bar { display: inline-block; height: 6px; border-radius: 3px; min-width: 2px; }
  .recent-table th, .recent-table td { font-size: 11px; padding: 5px 8px; }
  .recent-table tr { cursor: pointer; }
  .recent-table tr:hover td { background: rgba(88,166,255,0.1); }
  .section-title { font-size: 1.05em; margin: 20px 0 8px 0; color: var(--muted); }
  .slot-detail { background: #1c2128; }
  .slot-detail td { border-bottom: 1px solid #252c35; padding: 4px 10px; font-size: 11px; }
  .hidden { display: none; }
  #status { font-size: 11px; color: var(--muted); margin-left: auto; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px;
           font-weight: 600; text-transform: uppercase; }
  .badge.hit { background: rgba(63,185,80,0.2); color: var(--hit); }
  .badge.miss { background: rgba(248,81,73,0.2); color: var(--miss); }
  .badge.mem { background: rgba(210,153,34,0.2); color: var(--mem); }
  .badge.nf { background: rgba(240,136,62,0.2); color: var(--nf); }
  .badge.acc { background: rgba(139,148,158,0.2); color: var(--acc); }
  .badge.cold { background: rgba(248,81,73,0.2); color: var(--cold); }
  .badge.warm { background: rgba(63,185,80,0.2); color: var(--warm); }
</style>
</head>
<body>
<h1>Besu SLOAD Cache Analysis</h1>

<div class="controls">
  <input id="blockInput" type="text" placeholder="Block number or 'latest'" value="latest">
  <button onclick="loadBlock()">Load</button>
  <button id="autoBtn" onclick="toggleAuto()">Auto-refresh: OFF</button>
  <select id="sortSelect" onchange="sortCol=this.value;renderAccountTable()">
    <option value="total">Sort by: Total</option>
    <option value="notFound">Sort by: Not Found</option>
    <option value="cacheMisses">Sort by: Misses</option>
    <option value="cacheHits">Sort by: Hits</option>
    <option value="memtableHits">Sort by: Memtable</option>
    <option value="accumulatorHits">Sort by: Accumulator</option>
    <option value="notFoundPercent">Sort by: Not Found %</option>
    <option value="cacheMissPercent">Sort by: Miss %</option>
    <option value="cacheHitPercent">Sort by: Hit %</option>
    <option value="cold">Sort by: Cold</option>
    <option value="warm">Sort by: Warm</option>
    <option value="coldPercent">Sort by: Cold %</option>
    <option value="contractName">Sort by: Name</option>
  </select>
  <span id="status"></span>
</div>

<div class="summary" id="summaryCards"></div>

<div id="accountSection" class="hidden">
  <div class="section-title">Per-Contract Breakdown</div>
  <table id="accountTable">
    <thead><tr id="accountHeader"></tr></thead>
    <tbody id="accountBody"></tbody>
  </table>
</div>

<div class="section-title">Recent Blocks</div>
<table class="recent-table" id="recentTable">
  <thead>
    <tr><th>Block</th><th>Txs</th><th>SLOADs</th>
        <th>HIT</th><th>MISS</th><th>NOTFND</th><th>MEM</th><th>ACC</th>
        <th>Cold</th><th>Warm</th><th>Contracts</th></tr>
  </thead>
  <tbody id="recentBody"></tbody>
</table>

<script>
let currentData = null;
let autoRefresh = false;
let autoTimer = null;
let sortCol = 'total';

async function fetchJson(url) {
  const r = await fetch(url);
  return r.json();
}

async function loadBlock() {
  const val = document.getElementById('blockInput').value.trim() || 'latest';
  try {
    const data = await fetchJson('/api/block/' + val);
    if (data.error) { alert(data.error); return; }
    currentData = data;
    renderSummary(data);
    renderAccountTable();
    document.getElementById('accountSection').classList.remove('hidden');
  } catch(e) { console.error(e); }
  loadRecent();
  loadStatus();
}

function renderSummary(d) {
  const hasRocksdb = d.rocksdbStats;
  let cards = `
    <div class="stat-card"><div class="label">Block</div><div class="value">${d.blockNumber}</div></div>
    <div class="stat-card"><div class="label">Transactions</div><div class="value">${d.transactionCount}</div></div>
    <div class="stat-card"><div class="label">Total SLOADs</div><div class="value">${d.totalSloads}</div></div>`;

  if (hasRocksdb) {
    cards += `
    <div class="stat-card"><div class="label">Cache HIT</div><div class="value" style="color:var(--hit)">${d.cacheHits}</div></div>
    <div class="stat-card"><div class="label">Cache MISS</div><div class="value" style="color:var(--miss)">${d.cacheMisses}</div></div>
    <div class="stat-card"><div class="label">NOT FOUND</div><div class="value" style="color:var(--nf)">${d.notFound}</div></div>
    <div class="stat-card"><div class="label">Memtable</div><div class="value" style="color:var(--mem)">${d.memtableHits}</div></div>
    <div class="stat-card"><div class="label">Accumulator</div><div class="value" style="color:var(--acc)">${d.accumulatorHits}</div></div>
    <div class="stat-card"><div class="label">Hit Ratio</div><div class="value" style="color:var(--hit)">${d.cacheHitPercent}%</div></div>`;
  }

  cards += `
    <div class="stat-card"><div class="label">Cold (EVM)</div><div class="value" style="color:var(--cold)">${d.coldSloads}</div></div>
    <div class="stat-card"><div class="label">Warm (EVM)</div><div class="value" style="color:var(--warm)">${d.warmSloads}</div></div>
    <div class="stat-card"><div class="label">Contracts</div><div class="value">${d.accounts.length}</div></div>`;

  document.getElementById('summaryCards').innerHTML = cards;
}

function colDefs(hasRocksdb) {
  const cols = [
    {key:'address', label:'Contract', type:'string'},
    {key:'contractName', label:'Name', type:'string'},
    {key:'total', label:'Total', type:'number'},
  ];
  if (hasRocksdb) {
    cols.push({key:'cacheHits', label:'HIT', type:'number', color:'var(--hit)'});
    cols.push({key:'cacheMisses', label:'MISS', type:'number', color:'var(--miss)'});
    cols.push({key:'notFound', label:'NOTFND', type:'number', color:'var(--nf)'});
    cols.push({key:'memtableHits', label:'MEM', type:'number', color:'var(--mem)'});
    cols.push({key:'accumulatorHits', label:'ACC', type:'number', color:'var(--acc)'});
    cols.push({key:'cacheHitPercent', label:'Hit %', type:'number'});
    cols.push({key:'cacheMissPercent', label:'Miss %', type:'number'});
    cols.push({key:'notFoundPercent', label:'NF %', type:'number'});
  }
  cols.push({key:'cold', label:'Cold', type:'number', color:'var(--cold)'});
  cols.push({key:'warm', label:'Warm', type:'number', color:'var(--warm)'});
  cols.push({key:'coldPercent', label:'Cold %', type:'number'});
  cols.push({key:'bar', label:'', type:'bar'});
  return cols;
}

function renderAccountTable() {
  if (!currentData) return;
  const hasRocksdb = currentData.rocksdbStats;
  const cols = colDefs(hasRocksdb);

  let accounts = [...currentData.accounts];
  accounts.sort((a,b) => {
    if (sortCol === 'bar') return 0;
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string' || typeof vb === 'string') {
      return (va||'').localeCompare(vb||'');
    }
    return (vb||0) - (va||0);
  });

  const header = document.getElementById('accountHeader');
  header.innerHTML = cols.map(c => {
    const cls = c.key === sortCol ? ' class="sorted"' : '';
    const arrow = c.key === sortCol ? ' \u25BC' : '';
    return `<th${cls} onclick="setSort('${c.key}')">${c.label}${arrow}</th>`;
  }).join('');

  const body = document.getElementById('accountBody');
  body.innerHTML = accounts.map(a => {
    let row = `<tr onclick="toggleSlots(this, '${a.address}')">
      <td class="addr">${a.address}</td>
      <td class="name">${a.contractName || ''}</td>
      <td><b>${a.total}</b></td>`;

    for (let i = 3; i < cols.length; i++) {
      const c = cols[i];
      if (c.type === 'bar') {
        if (hasRocksdb) {
          const hitW = Math.max(1, (a.cacheHitPercent||0) * 0.6);
          const missW = Math.max(1, (a.cacheMissPercent||0) * 0.6);
          const nfW = Math.max(1, (a.notFoundPercent||0) * 0.6);
          row += `<td>
            <span class="pct-bar" style="background:var(--hit);width:${hitW}px"></span>
            <span class="pct-bar" style="background:var(--miss);width:${missW}px"></span>
            <span class="pct-bar" style="background:var(--nf);width:${nfW}px"></span>
          </td>`;
        } else {
          row += `<td>
            <span class="pct-bar" style="background:var(--cold);width:${(a.coldPercent||0)*0.6}px"></span>
            <span class="pct-bar" style="background:var(--warm);width:${(a.warmPercent||0)*0.6}px"></span>
          </td>`;
        }
      } else {
        const val = a[c.key];
        const disp = typeof val === 'number' && c.label.includes('%') ? val + '%' : (val ?? '');
        const style = c.color ? ` style="color:${c.color}"` : '';
        row += `<td${style}>${disp}</td>`;
      }
    }
    row += `</tr>`;
    return row;
  }).join('');
}

function setSort(col) {
  sortCol = col;
  const sel = document.getElementById('sortSelect');
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === col) { sel.selectedIndex = i; break; }
  }
  renderAccountTable();
}

async function toggleSlots(row, address) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains('slot-detail')) {
    next.remove();
    return;
  }
  const data = await fetchJson('/api/block/' + currentData.blockNumber + '/sloads?address=' + address);
  if (!data.sloads || data.sloads.length === 0) return;

  const hasRocksdb = currentData.rocksdbStats;
  const totalCols = document.querySelectorAll('#accountHeader th').length;
  let innerCols = '<th>Slot</th><th>Storage</th><th>EVM</th><th>Tx#</th>';

  const detail = document.createElement('tr');
  detail.className = 'slot-detail';
  detail.innerHTML = `<td colspan="${totalCols}"><table style="width:100%"><thead><tr>${innerCols}</tr></thead><tbody>` +
    data.sloads.map(s => {
      const st = s.storageType || 'UNKNOWN';
      const stClass = st === 'HIT' ? 'hit' : st === 'MISS' ? 'miss' :
                       st === 'NOT_FOUND' ? 'nf' : st === 'MEMTABLE' ? 'mem' : 'acc';
      const evmClass = s.cold ? 'cold' : 'warm';
      return `<tr>
        <td class="addr">${s.slot}</td>
        <td><span class="badge ${stClass}">${st}</span></td>
        <td><span class="badge ${evmClass}">${s.cold?'COLD':'WARM'}</span></td>
        <td>${s.txIndex}</td>
      </tr>`;
    }).join('') +
    '</tbody></table></td>';
  row.after(detail);
}

async function loadRecent() {
  try {
    const data = await fetchJson('/api/recent?count=30');
    const body = document.getElementById('recentBody');
    body.innerHTML = data.map(b => `
      <tr onclick="document.getElementById('blockInput').value=${b.blockNumber};loadBlock()">
        <td>${b.blockNumber}</td><td>${b.txCount}</td><td>${b.totalSloads}</td>
        <td style="color:var(--hit)">${b.cacheHits||0}</td>
        <td style="color:var(--miss)">${b.cacheMisses||0}</td>
        <td style="color:var(--nf)">${b.notFound||0}</td>
        <td style="color:var(--mem)">${b.memtableHits||0}</td>
        <td style="color:var(--acc)">${b.accumulatorHits||0}</td>
        <td style="color:var(--cold)">${b.coldSloads}</td>
        <td style="color:var(--warm)">${b.warmSloads}</td>
        <td>${b.contracts}</td>
      </tr>
    `).join('');
  } catch(e) {}
}

async function loadStatus() {
  try {
    const s = await fetchJson('/api/status');
    let parts = [`Blocks: ${s.blocksStored}`, `Names: ${s.contractNamesCached}`];
    if (s.pendingNameResolutions > 0) parts.push(`Pending: ${s.pendingNameResolutions}`);
    parts.push(`Etherscan: ${s.etherscanActive ? 'ON' : 'OFF'}`);
    parts.push(`RocksDB stats: ${s.rocksdbStatsAvailable ? 'ON' : 'OFF'}`);
    document.getElementById('status').textContent = parts.join(' | ');
  } catch(e) {}
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('autoBtn');
  if (autoRefresh) {
    btn.textContent = 'Auto-refresh: ON';
    btn.classList.add('toggle-on');
    autoTimer = setInterval(() => {
      document.getElementById('blockInput').value = 'latest';
      loadBlock();
    }, 6000);
  } else {
    btn.textContent = 'Auto-refresh: OFF';
    btn.classList.remove('toggle-on');
    clearInterval(autoTimer);
  }
}

loadBlock();
loadRecent();
loadStatus();
</script>
</body>
</html>
