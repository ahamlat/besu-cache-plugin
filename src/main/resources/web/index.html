<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Besu SLOAD Cache Analysis</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3;
          --muted: #8b949e; --accent: #58a6ff; --cold: #f85149; --warm: #3fb950;
          --accum: #8b949e; --mem: #d29922; --bcache: #3fb950; --disk: #f85149;
          --nf: #f0883e; --hit: #3fb950; --miss: #f85149; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--text); padding: 16px 20px; font-size: 13px; }
  h1 { font-size: 1.3em; margin-bottom: 12px; color: var(--accent); }
  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .controls input, .controls select, .controls button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 5px; font-size: 13px; }
  .controls button { cursor: pointer; background: var(--accent); color: #000; font-weight: 600; border: none; }
  .controls button:hover { opacity: 0.9; }
  .controls button.toggle-on { background: var(--warm); }
  #status { font-size: 11px; color: var(--muted); margin-left: auto; }

  .block-info { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 8px; margin-bottom: 14px; }
  .bi { background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
        padding: 8px 12px; }
  .bi .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .bi .val { font-size: 18px; font-weight: 700; margin-top: 1px; }
  .bi .sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .gas-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 4px; }
  .gas-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  .time-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 4px; background: var(--border); }
  .time-bar .evm { background: var(--accent); }
  .time-bar .sr { background: var(--mem); }

  .pie-row { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .pie-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
              padding: 12px 16px; display: flex; align-items: center; gap: 16px; min-width: 280px; flex: 1; }
  .pie-card .pie-title { font-size: 10px; color: var(--muted); text-transform: uppercase;
                         letter-spacing: 0.4px; margin-bottom: 6px; }
  .pie-svg { flex-shrink: 0; }
  .pie-legend { display: flex; flex-direction: column; gap: 3px; }
  .pie-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .pie-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pie-legend-val { font-weight: 700; min-width: 36px; text-align: right; }
  .pie-legend-pct { color: var(--muted); font-size: 10px; min-width: 40px; }

  table { width: 100%; border-collapse: collapse; background: var(--surface);
          border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 12px; }
  th { background: #1c2128; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }
  tr:hover td { background: rgba(88,166,255,0.04); }
  .addr { font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 11px; }
  .name { color: var(--accent); font-weight: 500; }
  .pct-bar { display: inline-block; height: 5px; border-radius: 2px; min-width: 1px; }
  .section-title { font-size: 1em; margin: 14px 0 6px 0; color: var(--muted); }
  .recent-table th, .recent-table td { font-size: 11px; padding: 4px 7px; }
  .recent-table tr { cursor: pointer; }
  .recent-table tr:hover td { background: rgba(88,166,255,0.08); }
  .slot-detail { background: #1c2128; }
  .slot-detail td { border-bottom: 1px solid #252c35; padding: 3px 8px; font-size: 11px; }
  .hidden { display: none; }
  .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px;
           font-weight: 600; text-transform: uppercase; }
  .badge.accum { background: rgba(139,148,158,0.15); color: var(--accum); }
  .badge.memtable { background: rgba(210,153,34,0.15); color: var(--mem); }
  .badge.bcache { background: rgba(63,185,80,0.15); color: var(--bcache); }
  .badge.disk { background: rgba(248,81,73,0.15); color: var(--disk); }
  .badge.nf { background: rgba(240,136,62,0.15); color: var(--nf); }
  .badge.cold { background: rgba(248,81,73,0.15); color: var(--cold); }
  .badge.warm { background: rgba(63,185,80,0.15); color: var(--warm); }
  .loading { color: var(--muted); font-style: italic; padding: 12px; }
</style>
</head>
<body>
<h1>Besu SLOAD Cache Analysis</h1>

<div class="controls">
  <input id="blockInput" type="text" placeholder="Block # or 'latest'" value="latest" style="width:160px">
  <button onclick="loadBlock()">Load</button>
  <button id="autoBtn" onclick="toggleAuto()">Auto-refresh: OFF</button>
  <select id="sortSelect" onchange="sortCol=this.value;renderAccountTable()">
    <option value="total">Sort: Total</option>
    <option value="accumulator">Sort: Accum</option>
    <option value="memtable">Sort: Memtable</option>
    <option value="blockCache">Sort: Cache</option>
    <option value="disk">Sort: Disk</option>
    <option value="notFound">Sort: NotFound</option>
    <option value="diskPercent">Sort: Disk%</option>
    <option value="cold">Sort: Cold</option>
    <option value="contractName">Sort: Name</option>
  </select>
  <span id="status"></span>
</div>

<div id="blockInfo" class="block-info hidden"></div>
<div id="pieRow" class="pie-row hidden"></div>

<div id="accountSection" class="hidden">
  <div class="section-title">Per-Contract Breakdown</div>
  <table id="accountTable">
    <thead><tr id="accountHeader"></tr></thead>
    <tbody id="accountBody"></tbody>
  </table>
</div>

<div class="section-title">Recent Blocks</div>
<table class="recent-table" id="recentTable">
  <thead>
    <tr><th>Block</th><th>Total</th><th>EVM</th><th>Root</th><th>MGas/s</th><th>Txs</th><th>Gas</th><th>SLOADs</th><th>SSTOREs</th>
        <th>Accum</th><th>Mem</th><th>Cache</th><th>Disk</th><th>NF</th>
        <th>Cold</th><th>Warm</th><th>Contracts</th></tr>
  </thead>
  <tbody id="recentBody"></tbody>
</table>

<script>
let currentData = null;
let autoRefresh = false;
let autoTimer = null;
let sortCol = 'total';
let recentLoaded = false;

async function fetchJson(url) {
  const r = await fetch(url);
  return r.json();
}

function fmt(n) {
  if (n === undefined || n === null) return '-';
  if (typeof n !== 'number') return n;
  return n.toLocaleString();
}

function fmtGas(n) {
  if (!n) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return n.toString();
}

function fmtMs(ms) {
  if (!ms && ms !== 0) return '-';
  if (ms >= 1000) return (ms/1000).toFixed(2) + 's';
  return ms + 'ms';
}

function bestTime(d) {
  return (d.totalBlockMs && d.totalBlockMs > 0) ? d.totalBlockMs : d.evmExecutionMs;
}

function calcMgasPerSec(gasUsed, ms) {
  if (!ms || ms <= 0 || !gasUsed) return 0;
  return (gasUsed / 1e6) / (ms / 1000);
}

function fmtMgas(mgas) {
  if (!mgas) return '-';
  return mgas.toFixed(1);
}

function timeColor(ms) {
  return (ms && ms > 500) ? 'var(--miss)' : '';
}

function layerBadgeClass(type) {
  switch(type) {
    case 'ACCUMULATOR': return 'accum';
    case 'MEMTABLE': return 'memtable';
    case 'BLOCK_CACHE': return 'bcache';
    case 'DISK': return 'disk';
    default: return 'accum';
  }
}

/* ---- SVG Donut Pie Chart ---- */
const PIE_R = 40, PIE_CX = 50, PIE_CY = 50, PIE_CIRC = 2 * Math.PI * PIE_R;

function donutSvg(slices, size) {
  const sz = size || 100;
  let paths = '';
  let offset = 0;
  for (const s of slices) {
    if (s.pct <= 0) continue;
    const dash = PIE_CIRC * s.pct / 100;
    const gap = PIE_CIRC - dash;
    paths += `<circle cx="${PIE_CX}" cy="${PIE_CY}" r="${PIE_R}" fill="none"
      stroke="${s.color}" stroke-width="14"
      stroke-dasharray="${dash} ${gap}"
      stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${PIE_CX} ${PIE_CY})"/>`;
    offset += dash;
  }
  if (offset === 0) {
    paths = `<circle cx="${PIE_CX}" cy="${PIE_CY}" r="${PIE_R}" fill="none"
      stroke="#30363d" stroke-width="14"/>`;
  }
  return `<svg class="pie-svg" width="${sz}" height="${sz}" viewBox="0 0 100 100">${paths}</svg>`;
}

function legendHtml(items) {
  return items.map(it =>
    `<div class="pie-legend-item">
      <span class="pie-legend-dot" style="background:${it.color}"></span>
      <span class="pie-legend-val">${fmt(it.value)}</span>
      <span class="pie-legend-pct">${it.pct.toFixed(1)}%</span>
      <span>${it.label}</span>
    </div>`
  ).join('');
}

function buildPieCard(title, slices) {
  return `<div class="pie-card">
    <div>
      <div class="pie-title">${title}</div>
      ${donutSvg(slices, 96)}
    </div>
    <div class="pie-legend">${legendHtml(slices)}</div>
  </div>`;
}

function renderPieCharts(d) {
  const el = document.getElementById('pieRow');

  const evmMs = d.evmExecutionMs || 0;
  const srMs = d.stateRootMs || 0;
  const hasSr = d.totalBlockMs && d.totalBlockMs > 0;
  const timeTotal = hasSr ? (evmMs + srMs) : evmMs;
  const timePie = hasSr
    ? [
        {label:'EVM', value:evmMs, pct: timeTotal>0 ? evmMs/timeTotal*100 : 100, color:'#58a6ff'},
        {label:'State Root', value:srMs, pct: timeTotal>0 ? srMs/timeTotal*100 : 0, color:'#d29922'}
      ]
    : [
        {label:'EVM', value:evmMs, pct:100, color:'#58a6ff'}
      ];

  const total = d.totalSloads || 1;
  const layerPie = [
    {label:'Accumulator', value:d.accumulator||0, pct:(d.accumulator||0)/total*100, color:'#8b949e'},
    {label:'Memtable',    value:d.memtable||0,    pct:(d.memtable||0)/total*100,    color:'#d29922'},
    {label:'Block Cache', value:d.blockCache||0,   pct:(d.blockCache||0)/total*100,  color:'#3fb950'},
    {label:'Disk',        value:d.disk||0,         pct:(d.disk||0)/total*100,        color:'#f85149'}
  ];

  const coldWarmPie = [
    {label:'Cold', value:d.coldSloads||0, pct:(d.coldSloads||0)/total*100, color:'#f85149'},
    {label:'Warm', value:d.warmSloads||0, pct:(d.warmSloads||0)/total*100, color:'#3fb950'}
  ];

  let html = buildPieCard('Block Time', timePie);
  html += buildPieCard('Storage Layer', layerPie);
  html += buildPieCard('EVM Access (EIP-2929)', coldWarmPie);

  el.innerHTML = html;
  el.classList.remove('hidden');
}

async function loadBlock() {
  const val = document.getElementById('blockInput').value.trim() || 'latest';
  try {
    const data = await fetchJson('/api/block/' + val);
    if (data.error) { alert(data.error); return; }
    currentData = data;
    renderBlockInfo(data);
    renderPieCharts(data);
    renderAccountTable();
    document.getElementById('blockInfo').classList.remove('hidden');
    document.getElementById('accountSection').classList.remove('hidden');
  } catch(e) { console.error(e); }
  if (!recentLoaded) { loadRecent(); recentLoaded = true; }
  loadStatus();
}

function renderBlockInfo(d) {
  const el = document.getElementById('blockInfo');
  const gasP = d.gasUsedPercent || 0;
  const hasRdb = d.rocksdbStats;

  const totalMs = bestTime(d);
  const mgas = calcMgasPerSec(d.gasUsed, totalMs);
  const totalColor = timeColor(totalMs);
  const totalStyle = totalColor ? ` style="color:${totalColor}"` : '';

  const evmMs = d.evmExecutionMs || 0;
  const srMs = d.stateRootMs || 0;
  const hasSrTiming = d.totalBlockMs && d.totalBlockMs > 0;
  const evmPct = hasSrTiming && totalMs > 0 ? (evmMs / totalMs * 100) : 100;
  const srPct = hasSrTiming && totalMs > 0 ? (srMs / totalMs * 100) : 0;

  const total = d.totalSloads || 1;
  const aPct = ((d.accumulator||0)/total*100).toFixed(1);
  const mPct = ((d.memtable||0)/total*100).toFixed(1);
  const cPct = ((d.blockCache||0)/total*100).toFixed(1);
  const dPct = ((d.disk||0)/total*100).toFixed(1);

  let html = `
    <div class="bi"><div class="lbl">Block</div><div class="val">${fmt(d.blockNumber)}</div></div>
    <div class="bi"><div class="lbl">Total Time</div><div class="val"${totalStyle}>${fmtMs(totalMs)}</div>
      <div class="sub"><span style="color:var(--accent)">EVM ${fmtMs(evmMs)}</span>`;
  if (hasSrTiming) {
    html += ` &middot; <span style="color:var(--mem)">Root ${fmtMs(srMs)}</span>`;
  }
  html += `</div>
      <div class="time-bar"><div class="evm" style="width:${evmPct}%"></div><div class="sr" style="width:${srPct}%"></div></div>
    </div>
    <div class="bi"><div class="lbl">MGas/s</div><div class="val">${fmtMgas(mgas)}</div></div>
    <div class="bi"><div class="lbl">Transactions</div><div class="val">${d.transactionCount}</div></div>
    <div class="bi"><div class="lbl">Gas Used</div><div class="val">${fmtGas(d.gasUsed)}</div>
      <div class="sub">${gasP}% of ${fmtGas(d.gasLimit)}</div>
      <div class="gas-bar"><div class="gas-bar-fill" style="width:${gasP}%"></div></div></div>
    <div class="bi"><div class="lbl">Base Fee</div><div class="val">${d.baseFeeGwei} Gwei</div></div>`;

  if (d.blobTxCount > 0 || d.blobGasUsed > 0) {
    html += `<div class="bi"><div class="lbl">Blob Txs</div><div class="val">${d.blobTxCount}</div>
      <div class="sub">${fmtGas(d.blobGasUsed)} blob gas</div></div>`;
  }

  html += `
    <div class="bi"><div class="lbl">SLOADs</div><div class="val">${fmt(d.totalSloads)}</div></div>
    <div class="bi"><div class="lbl">SSTOREs</div><div class="val">${fmt(d.totalSstores)}</div></div>
    <div class="bi"><div class="lbl">Accumulator</div><div class="val" style="color:var(--accum)">${fmt(d.accumulator)}</div>
      <div class="sub">${aPct}% &middot; in-memory cache</div></div>
    <div class="bi"><div class="lbl">Memtable</div><div class="val" style="color:var(--mem)">${fmt(d.memtable)}</div>
      <div class="sub">${mPct}% &middot; RocksDB write buffer</div></div>
    <div class="bi"><div class="lbl">Block Cache</div><div class="val" style="color:var(--bcache)">${fmt(d.blockCache)}</div>
      <div class="sub">${cPct}% &middot; RocksDB block cache</div></div>
    <div class="bi"><div class="lbl">Disk</div><div class="val" style="color:var(--disk)">${fmt(d.disk)}</div>
      <div class="sub">${dPct}% &middot; SST file read</div></div>
    <div class="bi"><div class="lbl">Not Found</div><div class="val" style="color:var(--nf)">${fmt(d.notFound)}</div>
      <div class="sub">slot empty (value=0)</div></div>
    <div class="bi"><div class="lbl">Cold (EVM)</div><div class="val" style="color:var(--cold)">${fmt(d.coldSloads)}</div></div>
    <div class="bi"><div class="lbl">Warm (EVM)</div><div class="val" style="color:var(--warm)">${fmt(d.warmSloads)}</div></div>
    <div class="bi"><div class="lbl">Contracts</div><div class="val">${d.accounts.length}</div></div>`;

  if (hasRdb) {
    html += `<div class="bi"><div class="lbl">RocksDB Block Totals</div>
      <div class="sub" style="margin-top:3px">
        <span style="color:var(--hit)">Hit ${fmt(d.blockDataCacheHit)}</span>&ensp;
        <span style="color:var(--miss)">Miss ${fmt(d.blockDataCacheMiss)}</span>&ensp;
        <span style="color:var(--mem)">Mem ${fmt(d.blockMemtableHit)}</span>
      </div></div>`;
  }

  el.innerHTML = html;
}

function colDefs() {
  return [
    {key:'address', label:'Contract', type:'string'},
    {key:'contractName', label:'Name', type:'string'},
    {key:'total', label:'Total', type:'number'},
    {key:'accumulator', label:'Accum', type:'number', color:'var(--accum)'},
    {key:'memtable', label:'Mem', type:'number', color:'var(--mem)'},
    {key:'blockCache', label:'Cache', type:'number', color:'var(--bcache)'},
    {key:'disk', label:'Disk', type:'number', color:'var(--disk)'},
    {key:'notFound', label:'NF', type:'number', color:'var(--nf)'},
    {key:'accumulatorPercent', label:'Acc%', type:'number'},
    {key:'memtablePercent', label:'Mem%', type:'number'},
    {key:'blockCachePercent', label:'Cch%', type:'number'},
    {key:'diskPercent', label:'Dsk%', type:'number'},
    {key:'notFoundPercent', label:'NF%', type:'number'},
    {key:'cold', label:'Cold', type:'number', color:'var(--cold)'},
    {key:'warm', label:'Warm', type:'number', color:'var(--warm)'},
    {key:'bar', label:'', type:'bar'}
  ];
}

function renderAccountTable() {
  if (!currentData) return;
  const cols = colDefs();

  let accounts = [...currentData.accounts];
  accounts.sort((a,b) => {
    if (sortCol === 'bar') return 0;
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string' || typeof vb === 'string') return (va||'').localeCompare(vb||'');
    return (vb||0) - (va||0);
  });

  const header = document.getElementById('accountHeader');
  header.innerHTML = cols.map(c => {
    const cls = c.key === sortCol ? ' class="sorted"' : '';
    const arrow = c.key === sortCol ? ' \u25BC' : '';
    return `<th${cls} onclick="setSort('${c.key}')">${c.label}${arrow}</th>`;
  }).join('');

  const body = document.getElementById('accountBody');
  body.innerHTML = accounts.map(a => {
    let row = `<tr onclick="toggleSlots(this, '${a.address}')">
      <td class="addr">${a.address}</td>
      <td class="name">${a.contractName || ''}</td>
      <td><b>${a.total}</b></td>`;
    for (let i = 3; i < cols.length; i++) {
      const c = cols[i];
      if (c.type === 'bar') {
        const aW = Math.max(1, (a.accumulatorPercent||0) * 0.5);
        const mW = Math.max(1, (a.memtablePercent||0) * 0.5);
        const cW = Math.max(1, (a.blockCachePercent||0) * 0.5);
        const dW = Math.max(1, (a.diskPercent||0) * 0.5);
        row += `<td>
          <span class="pct-bar" style="background:var(--accum);width:${aW}px"></span>
          <span class="pct-bar" style="background:var(--mem);width:${mW}px"></span>
          <span class="pct-bar" style="background:var(--bcache);width:${cW}px"></span>
          <span class="pct-bar" style="background:var(--disk);width:${dW}px"></span></td>`;
      } else {
        const val = a[c.key];
        const disp = typeof val === 'number' && c.label.includes('%') ? val + '%' : (val ?? '');
        const style = c.color ? ` style="color:${c.color}"` : '';
        row += `<td${style}>${disp}</td>`;
      }
    }
    row += `</tr>`;
    return row;
  }).join('');
}

function setSort(col) {
  sortCol = col;
  const sel = document.getElementById('sortSelect');
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === col) { sel.selectedIndex = i; break; }
  }
  renderAccountTable();
}

async function toggleSlots(row, address) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains('slot-detail')) { next.remove(); return; }
  const totalCols = document.querySelectorAll('#accountHeader th').length;

  const loadingRow = document.createElement('tr');
  loadingRow.className = 'slot-detail';
  loadingRow.innerHTML = `<td colspan="${totalCols}" class="loading">Loading slots...</td>`;
  row.after(loadingRow);

  const data = await fetchJson('/api/block/' + currentData.blockNumber + '/sloads?address=' + address);
  loadingRow.remove();
  if (!data.sloads || data.sloads.length === 0) return;

  const detail = document.createElement('tr');
  detail.className = 'slot-detail';
  detail.innerHTML = `<td colspan="${totalCols}"><table style="width:100%">
    <thead><tr><th>#</th><th>Slot</th><th>Layer</th><th>Value</th><th>EVM</th><th>Tx#</th></tr></thead><tbody>` +
    data.sloads.map((s, i) => {
      const st = s.storageType || 'ACCUMULATOR';
      const stClass = layerBadgeClass(st);
      const evmClass = s.cold ? 'cold' : 'warm';
      const nfBadge = s.notFound ? '<span class="badge nf">NOT FOUND</span>' : '<span class="badge bcache">FOUND</span>';
      return `<tr><td style="color:var(--muted)">${i+1}</td>
        <td class="addr">${s.slot}</td>
        <td><span class="badge ${stClass}">${st}</span></td>
        <td>${nfBadge}</td>
        <td><span class="badge ${evmClass}">${s.cold?'COLD':'WARM'}</span></td>
        <td>${s.txIndex}</td></tr>`;
    }).join('') + '</tbody></table></td>';
  row.after(detail);
}

async function loadRecent() {
  try {
    const data = await fetchJson('/api/recent?count=30');
    const body = document.getElementById('recentBody');
    body.innerHTML = data.map(b => {
      const totalMs = bestTime(b);
      const tc = timeColor(totalMs);
      const tStyle = tc ? ` style="color:${tc}"` : '';
      const mg = calcMgasPerSec(b.gasUsed, totalMs);
      const hasSr = b.totalBlockMs && b.totalBlockMs > 0;
      return `<tr onclick="document.getElementById('blockInput').value=${b.blockNumber};loadBlock()">
        <td>${b.blockNumber}</td>
        <td${tStyle}>${fmtMs(totalMs)}</td>
        <td style="color:var(--accent)">${fmtMs(b.evmExecutionMs)}</td>
        <td style="color:var(--mem)">${hasSr ? fmtMs(b.stateRootMs) : '-'}</td>
        <td>${fmtMgas(mg)}</td>
        <td>${b.txCount}</td>
        <td>${fmtGas(b.gasUsed)} <span style="color:var(--muted);font-size:10px">(${b.gasUsedPercent}%)</span></td>
        <td>${b.totalSloads}</td>
        <td>${b.totalSstores}</td>
        <td style="color:var(--accum)">${b.accumulator}</td>
        <td style="color:var(--mem)">${b.memtable}</td>
        <td style="color:var(--bcache)">${b.blockCache}</td>
        <td style="color:var(--disk)">${b.disk}</td>
        <td style="color:var(--nf)">${b.notFound}</td>
        <td style="color:var(--cold)">${b.coldSloads}</td>
        <td style="color:var(--warm)">${b.warmSloads}</td>
        <td>${b.contracts}</td>
      </tr>`;
    }).join('');
  } catch(e) {}
}

async function loadStatus() {
  try {
    const s = await fetchJson('/api/status');
    let parts = [`Blocks: ${s.blocksStored}`, `Names: ${s.contractNamesCached}`];
    if (s.pendingNameResolutions > 0) parts.push(`Pending: ${s.pendingNameResolutions}`);
    parts.push(`Etherscan: ${s.etherscanActive ? 'ON' : 'OFF'}`);
    parts.push(`RocksDB: ${s.rocksdbStatsAvailable ? 'ON' : 'OFF'}`);
    document.getElementById('status').textContent = parts.join(' | ');
  } catch(e) {}
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('autoBtn');
  if (autoRefresh) {
    btn.textContent = 'Auto-refresh: ON';
    btn.classList.add('toggle-on');
    autoTimer = setInterval(() => {
      document.getElementById('blockInput').value = 'latest';
      loadBlock();
      loadRecent();
    }, 6000);
  } else {
    btn.textContent = 'Auto-refresh: OFF';
    btn.classList.remove('toggle-on');
    clearInterval(autoTimer);
  }
}

loadBlock();
loadStatus();
</script>
</body>
</html>
